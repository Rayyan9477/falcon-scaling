# Deploy from repo root with: render.yaml (in project root)
services:
  - type: web
    name: fo-intelligence-api
    runtime: docker
    dockerfilePath: ../Dockerfile
    envVars:
      - key: LLM_MODEL
        value: gpt-4o
      - key: LLM_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
