# Prerequisites:
# 1. Copy backend/.env.example to backend/.env and add your LLM API key

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - DATASET_PATH=/app/data/family_office_dataset.xlsx

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
